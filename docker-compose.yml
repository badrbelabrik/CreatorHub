version: '3.8'

services:

    app:
        build: .
        container_name: creatorhub-app
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql

    mysql:
        image: mysql:8.4
        container_name: creatorhub-db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: creatorhub
            MYSQL_USER: creator
            MYSQL_PASSWORD: password
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: creatorhub-pma
        restart: always
        ports:
            - "8080:80"
        environment:
            PMA_HOST: mysql
            MYSQL_ROOT_PASSWORD: root
        depends_on:
            - mysql

volumes:
    mysql_data:
